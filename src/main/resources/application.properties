spring.application.name=flowtrack


spring.datasource.url=jdbc:mysql://localhost:3306/flowtrack?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql


server.port=8080
spring.devtools.add-properties=true
spring.devtools.livereload.enabled=true
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
# Se você estiver usando o IntelliJ e quiser que alterações de arquivos reflitam na hora:
# spring.web.resources.static-locations=file:src/main/resources/static/
